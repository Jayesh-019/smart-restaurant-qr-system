<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Dashboard | Smart Restaurant QR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="dashboard-shell">
    <div class="container-fluid">
        <div class="row min-vh-100">
            <aside class="col-lg-3 sidebar-panel">
                <div class="p-4">
                    <span class="eyebrow">Kitchen Panel</span>
                    <h1 class="h3 fw-bold mt-2">Live Orders</h1>
                    <p class="text-soft">Accept, prepare, and complete orders in real time.</p>

                    <div class="glass-card p-4 mt-4" id="kitchen-login-card">
                        <h2 class="h5 fw-bold mb-3">Staff Login</h2>
                        <div class="mb-3">
                            <input id="login-email" class="form-control" value="kitchen@restaurant.local" placeholder="Email">
                        </div>
                        <div class="mb-3">
                            <input id="login-password" type="password" class="form-control" value="Kitchen@123" placeholder="Password">
                        </div>
                        <button id="login-btn" class="btn btn-primary w-100">Login</button>
                    </div>

                    <div class="glass-card p-4 mt-4 d-none" id="kitchen-summary-card">
                        <div class="small text-uppercase text-soft mb-2">Shift Status</div>
                        <div class="h5 fw-bold mb-1">Kitchen Online</div>
                        <p class="text-soft small mb-3">Dashboard refreshes automatically to keep orders moving.</p>
                        <button id="logout-btn" class="btn btn-outline-light w-100">Logout</button>
                    </div>
                </div>
            </aside>

            <main class="col-lg-9 content-panel">
                <div class="p-4 p-lg-5">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <span class="eyebrow">Operations</span>
                            <h2 class="fw-bold mb-1">Kitchen workflow board</h2>
                            <p class="text-soft mb-0">Monitor all incoming orders and update progress fast.</p>
                        </div>
                    </div>

                    <div id="kitchen-alert"></div>
                    <div class="row g-4" id="live-orders"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/kitchen.js"></script>
</body>
</html>
