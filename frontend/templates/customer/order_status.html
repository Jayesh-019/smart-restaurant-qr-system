<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status | Smart Restaurant QR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="theme-shell">
    <div class="container py-5">
        <div class="status-hero mb-4">
            <span class="eyebrow">Live Tracking</span>
            <h1 class="fw-bold mt-2 mb-2">Your order is in progress</h1>
            <p class="text-soft mb-0">Stay on this page to watch live kitchen updates for your order.</p>
        </div>

        <div id="customer-alert"></div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="glass-card p-4 h-100">
                    <div class="small text-uppercase text-soft mb-2">Order Number</div>
                    <div class="h3 fw-bold mb-3" id="status-order-number">-</div>

                    <div class="summary-row">
                        <span>Table</span>
                        <strong id="status-table-number">-</strong>
                    </div>
                    <div class="summary-row">
                        <span>Status</span>
                        <span id="status-pill-holder"></span>
                    </div>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <strong id="status-subtotal">₹0.00</strong>
                    </div>
                    <div class="summary-row">
                        <span>Tax</span>
                        <strong id="status-tax">₹0.00</strong>
                    </div>
                    <div class="summary-row border-0 pb-0">
                        <span>Total</span>
                        <strong id="status-total">₹0.00</strong>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="glass-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="h5 fw-bold mb-0">Ordered Items</h2>
                        <span class="text-soft small">Auto-refresh every 5 seconds</span>
                    </div>
                    <div id="status-items"></div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="/customer/select_table" class="btn btn-outline-light">Start New Order</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/customer.js"></script>
</body>
</html>
