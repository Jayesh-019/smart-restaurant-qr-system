<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Smart Restaurant QR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="dashboard-shell">
    <div class="container py-5">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <span class="eyebrow">Customer Cart</span>
                <h1 class="fw-bold mb-1">Review your order</h1>
                <p class="text-soft mb-0">Confirm quantities, add notes, and place the order.</p>
            </div>
            <a href="/customer/menu" class="btn btn-outline-light">Back To Menu</a>
        </div>

        <div id="customer-alert"></div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="glass-card p-4">
                    <h2 class="h5 fw-bold mb-3">Items In Cart</h2>
                    <div id="cart-page-items"></div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="glass-card p-4 sticky-top" style="top: 24px;">
                    <h2 class="h5 fw-bold mb-3">Order Summary</h2>

                    <div class="summary-row">
                        <span>Table</span>
                        <strong id="summary-table">-</strong>
                    </div>
                    <div class="summary-row">
                        <span>Customer</span>
                        <strong id="summary-customer">Guest</strong>
                    </div>
                    <div class="summary-row">
                        <span>Items</span>
                        <strong id="summary-count">0</strong>
                    </div>
                    <div class="summary-row border-0 pb-0">
                        <span>Subtotal</span>
                        <strong id="summary-subtotal">₹0.00</strong>
                    </div>

                    <div class="mt-4">
                        <label for="order-notes" class="form-label">Order Notes</label>
                        <textarea id="order-notes" class="form-control" rows="4" placeholder="Add any special instructions..."></textarea>
                    </div>

                    <button id="place-order-btn" class="btn btn-primary btn-lg w-100 mt-4">Place Order</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/customer.js"></script>
</body>
</html>
