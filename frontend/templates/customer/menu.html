<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Smart Restaurant QR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="dashboard-shell">
    <div class="container-fluid">
        <div class="row min-vh-100">
            <aside class="col-lg-3 sidebar-panel">
                <div class="p-4">
                    <div class="brand-block mb-4">
                        <span class="eyebrow">Customer View</span>
                        <h1 class="h3 fw-bold mt-2 mb-1">Digital Menu</h1>
                        <p class="text-soft mb-0">Browse, select, and build your table order.</p>
                    </div>

                    <div class="glass-card p-4 mb-4">
                        <div class="small text-uppercase text-soft mb-2">Selected Table</div>
                        <div class="h4 fw-bold mb-1" id="selected-table-number">-</div>
                        <div class="text-soft" id="selected-customer-name">Guest</div>
                    </div>

                    <div class="glass-card p-4">
                        <div class="d-flex justify-content-between mb-3">
                            <span class="fw-semibold">Cart</span>
                            <span class="badge rounded-pill text-bg-light" id="cart-count-badge">0 Items</span>
                        </div>
                        <div id="mini-cart-preview" class="text-soft small mb-3">No items added yet.</div>
                        <button id="go-to-cart-btn" class="btn btn-primary w-100">Review Cart</button>
                    </div>
                </div>
            </aside>

            <main class="col-lg-9 content-panel">
                <div class="p-4 p-lg-5">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                        <div>
                            <span class="eyebrow">Fresh Picks</span>
                            <h2 class="fw-bold mb-1">Choose your favorites</h2>
                            <p class="text-soft mb-0">Add dishes with a single tap and keep your order moving.</p>
                        </div>
                        <div class="search-shell">
                            <input id="menu-search" class="form-control" placeholder="Search menu items...">
                        </div>
                    </div>

                    <div id="customer-alert"></div>

                    <div class="category-tabs mb-4">
                        <button class="category-tab active" data-category="all">All</button>
                        <button class="category-tab" data-category="starter">Starters</button>
                        <button class="category-tab" data-category="main_course">Main Course</button>
                        <button class="category-tab" data-category="beverage">Beverages</button>
                        <button class="category-tab" data-category="dessert">Desserts</button>
                    </div>

                    <div class="row g-4" id="menu-grid"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/customer.js"></script>
</body>
</html>
